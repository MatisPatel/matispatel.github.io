- title: Education
  type: time_table
  contents:
    - title: DPhil, Helping and Harming
      institution: University of Oxford
      year: 2015-2019
      description:
        - My DPhil has focused on the evolution of cooperation. My second chapter
focuses on the evolution of a public good (Cry toxin) in a bacteria that
infects a seasonally varying host. In my second chapter we modelled the
long term dynamics of the cooperator evolving. My fourth chapter looks
at the evolution of spiteful behaviour and how that is sometimes
conflated with selfishness when fitness effects are mis-partitioned. My
fifth chapter looks at the symbiosis and how a host can be evolve to
control the relatedness among its symbionts to force cooperation and
reap the benefits. My work is theoretical with analysis done in
Mathemtica and some programming of simulations in Julia.
    - title: MSc Computation methods in Ecology and Evolution
      institution: Imperial College London
      year: 2014-2015
      description:
        - Modules covering single and multivariate calculus, linear algebra,
statistics (linear models, GLMs and ANOVA), Maximum likelihood methods,
and Bayesian statistics. The course also covered agent based simulation
and evolutionary simulations as well as model fitting and phylogenetic
methods. My thesis was a nearly neutral simulation of latitudinal
diversity gradients which was written in python based of of C code and
run using the Imperial HPC.
    - title: BA Biological Sciences
      institution: University of Oxford
      year: 2011-2014
      description:
        - I took modules in social evolution, behavioural ecology, evolutionary
ecology, bio-mechanics, and animal cognition. I undertook a dissertation
on modelling spiteful territory size evolution and am currently working
on a paper based on this work.

